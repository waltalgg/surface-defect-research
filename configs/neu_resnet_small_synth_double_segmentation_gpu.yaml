experiment:
  name: neu_resnet18_small_synth_double_segmentation_gpu
  seed: 42
  output_dir: artifacts/runs/neu_resnet18_small_synth_double_segmentation_gpu

dataset:
  raw_dir: data/raw/neu_steel
  processed_dir: data/processed
  manifest_path: data/dataset/neu_steel_small_synth_double_segmentation_gpu_manifest.json
  image_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  allowed_extensions:
    - .bmp
  max_images_per_class: null
  train_images_per_class: 40

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  pin_memory: true
  device: cuda
  optimizer: adamw
  scheduler: cosine
  label_smoothing: 0.05

model:
  name: resnet18
  dropout: 0.3
  pretrained: false

synthetic:
  enabled: true
  multiplier: 2.0
  method: composite
  mask_source: segmentation
  segmentation_checkpoint_path: artifacts/runs/neu_segmentation_gpu/best.pt
  segmentation_image_size: 224
  segmentation_base_channels: 32
  output_dir: data/processed/synthetic_neu_small_double_segmentation_gpu
  merged_manifest_path: data/dataset/neu_steel_small_synth_double_segmentation_gpu_manifest.json
  save_debug_artifacts: true
  debug_output_dir: artifacts/synthetic_debug/neu_small_synth_double_segmentation_gpu

evaluation:
  checkpoint_path: artifacts/runs/neu_resnet18_small_synth_double_segmentation_gpu/best.pt
